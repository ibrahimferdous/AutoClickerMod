name: Build Mod
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew setupDecompWorkspace
          ./gradlew build
      - uses: actions/upload-artifact@v4
        with:
          name: AutoClickerMod
          path: build/libs/*.jar
